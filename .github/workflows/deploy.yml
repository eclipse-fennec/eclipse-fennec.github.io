name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege: no token permissions by default; each job opts in below.
permissions: {}

# Only the latest commit to main matters for a docs site: supersede any
# queued/running deploy so bursts of merges don't pile up.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # only needs to read the repo to build
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # needed for lastUpdated git timestamps
          persist-credentials: false # don't leave the token in .git/config
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build with VitePress
        run: npm run docs:build
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # publish to GitHub Pages
      id-token: write # OIDC token for the Pages deployment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
